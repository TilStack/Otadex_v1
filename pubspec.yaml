name: otadex
description: The Ultimate Anime Character Encyclopedia
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # Fonts
  google_fonts: ^6.1.0

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # Storage local
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0

  # UI & Animations
  smooth_page_indicator: ^1.1.0
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0

  # Assets & Images
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.0

  # Auth
  google_sign_in: ^6.2.0

  # Utils
  gap: ^3.0.1

  # Media
  image_picker: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo/
    - assets/images/onboarding/
    - assets/images/splash/
    - assets/data/
    # ── Character images (legacy) ────────────────────────────────────────────
    - assets/images/characters/satoru_gojo/
    # ── Jujutsu Kaisen ──────────────────────────────────────────────────────
    - assets/images/jujutsu_kaisen/aoi_todo/
    - assets/images/jujutsu_kaisen/chojo_kamo/
    - assets/images/jujutsu_kaisen/gojo_satoru/
    - assets/images/jujutsu_kaisen/hiromi_higuruma/
    - assets/images/jujutsu_kaisen/kenjaku/
    - assets/images/jujutsu_kaisen/mahito/
    - assets/images/jujutsu_kaisen/maki_zenin/
    - assets/images/jujutsu_kaisen/megumi_fushiguro/
    - assets/images/jujutsu_kaisen/nanami_kento/
    - assets/images/jujutsu_kaisen/suguru_geto/
    - assets/images/jujutsu_kaisen/sukuna/
    - assets/images/jujutsu_kaisen/toge_inumaki/
    - assets/images/jujutsu_kaisen/toji_fushiguro/
    - assets/images/jujutsu_kaisen/yuji_itadori/
    - assets/images/jujutsu_kaisen/yuta_okkotsu/
